services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vast
      POSTGRES_PASSWORD: vast
      POSTGRES_DB: vast
    ports:
      - "5432:5432"
    volumes:
      - vast_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  vast_pgdata:
