name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vast/db generate
      - run: pnpm --filter @vast/shared build
      - run: pnpm typecheck
      - run: pnpm build

  isolation:
    name: tenant isolation (RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vast
          POSTGRES_PASSWORD: vast
          POSTGRES_DB: vast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vast"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vast:vast@localhost:5432/vast?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vast/db generate
      - run: pnpm --filter @vast/db deploy
      - run: pnpm --filter @vast/db apply-rls
      - run: pnpm --filter @vast/db test:isolation
