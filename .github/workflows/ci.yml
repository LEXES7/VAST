name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vast/db generate
      - run: pnpm --filter @vast/shared build
      - run: pnpm typecheck
      - run: pnpm build

  isolation:
    name: tenant isolation (RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vast
          POSTGRES_PASSWORD: vast
          POSTGRES_DB: vast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vast"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Admin role (superuser) — used ONLY for migrations + RLS setup.
      ADMIN_URL: postgresql://vast:vast@localhost:5432/vast?schema=public
      # Restricted app role — RLS is enforced on it, like production.
      APP_URL: postgresql://vast_app:vast_app@localhost:5432/vast?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vast/db generate
      - name: Migrate and apply RLS (admin role)
        env:
          DATABASE_URL: ${{ env.ADMIN_URL }}
          DIRECT_URL: ${{ env.ADMIN_URL }}
        run: |
          pnpm --filter @vast/db deploy
          pnpm --filter @vast/db apply-rls
      - name: Create restricted app role
        run: |
          PGPASSWORD=vast psql -h localhost -U vast -d vast -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE vast_app LOGIN PASSWORD 'vast_app';
          GRANT USAGE ON SCHEMA public TO vast_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO vast_app;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO vast_app;
          SQL
      - name: Tenant isolation test (restricted role — RLS enforced)
        env:
          DATABASE_URL: ${{ env.APP_URL }}
        run: pnpm --filter @vast/db test:isolation
